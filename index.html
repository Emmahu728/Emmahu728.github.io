<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>实验推全方式确认</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <h1>实验推全方式确认</h1>
      </div>
      <div class="status-pill" id="ownerBadge">请输入邮箱前缀</div>
    </section>

    <section class="notice" id="messageBox" hidden></section>

    <section class="lookup-panel" id="lookupPanel">
      <form id="lookupForm" class="lookup-form">
        <label class="question-label" for="creatorInput">请输入你在字节的邮箱前缀，注意检查拼写是否正确，且不要带@bytedance.com</label>
        <div class="lookup-row">
          <input class="text-input" id="creatorInput" name="creator" autocomplete="username" placeholder="例如 zhangsan" required>
          <button type="submit">确定</button>
        </div>
      </form>
    </section>

    <form id="surveyForm" class="experiment-list" hidden></form>

    <section class="submitbar" id="submitBar" hidden>
      <div>
        <strong id="progressText">待填写</strong>
        <span>所有实验都选择后即可提交。</span>
      </div>
      <button type="submit" form="surveyForm">提交</button>
    </section>
  </main>
  <div class="toast" id="toast" hidden></div>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
